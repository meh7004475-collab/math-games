<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأعداد ضمن مئات الألوف - الصف الرابع</title>
<style>
:root {
  --primary: #1B5E20;
  --primary-mid: #388E3C;
  --primary-light: #A5D6A7;
  --accent: #F57F17;
  --accent-light: #FFF9C4;
  --sky: #0277BD;
  --sky-light: #E1F5FE;
  --red: #C62828;
  --red-light: #FFEBEE;
  --purple: #6A1B9A;
  --purple-light: #F3E5F5;
  --bg: #E8F5E9;
  --shadow: 0 4px 20px rgba(27,94,32,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Arial', sans-serif;
  background: linear-gradient(135deg, #E8F5E9 0%, #E3F2FD 60%, #FFF9C4 100%);
  min-height: 100vh;
  color: #1A237E;
  direction: rtl;
}

/* HEADER */
.hdr {
  background: linear-gradient(135deg, #1B5E20, #2E7D32);
  color: white; padding: 12px 18px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 3px 12px rgba(27,94,32,0.35);
  position: sticky; top: 0; z-index: 100;
}
.hdr-title { font-size: 1.15rem; font-weight: 900; }
.score-box {
  background: var(--accent); color: #1B5E20;
  border-radius: 20px; padding: 5px 15px;
  font-weight: 900; font-size: 1.05rem;
  display: flex; align-items: center; gap: 5px;
  transition: transform .2s;
}

/* PROGRESS */
.prog-wrap { padding: 10px 18px 0; }
.prog-label { font-size: .82rem; color: #555; font-weight: 700; margin-bottom: 3px; }
.prog-bar { background: #C8E6C9; border-radius: 10px; height: 13px; overflow: hidden; }
.prog-fill { background: linear-gradient(90deg, #66BB6A, #1B5E20); height: 100%; border-radius: 10px; transition: width .5s; }

/* MAIN */
.gmain { max-width: 720px; margin: 0 auto; padding: 14px; }

/* CARD */
.card {
  background: white; border-radius: 22px; padding: 22px;
  box-shadow: var(--shadow); margin-bottom: 14px;
  border: 3px solid #C8E6C9;
  animation: slideIn .4s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);} }

.badge {
  display: inline-block;
  background: linear-gradient(135deg, #1B5E20, #2E7D32);
  color: white; border-radius: 20px; padding: 4px 13px;
  font-size: .78rem; font-weight: 700; margin-bottom: 9px;
}
.ctitle { font-size: 1.25rem; font-weight: 900; color: #1B5E20; margin-bottom: 9px; }
.cdesc {
  background: var(--sky-light); border-radius: 11px;
  padding: 11px 15px; font-size: .93rem; line-height: 1.9;
  margin-bottom: 13px; border-right: 4px solid var(--sky);
}

/* MASCOT */
.mascot-row {
  display: flex; align-items: flex-start; gap: 11px;
  background: var(--accent-light); border-radius: 15px;
  padding: 11px 15px; margin-bottom: 14px;
  border: 2px solid var(--accent);
}
.mascot-svg { flex-shrink: 0; width: 56px; }
.mascot-txt { font-size: .93rem; line-height: 1.75; font-weight: 600; color: #4E342E; }

/* PLACE TABLE — RTL: آحاد في أقصى اليمين */
.ptable {
  width: 100%; border-collapse: collapse;
  margin: 13px 0; direction: rtl;
}
.ptable th {
  background: #1B5E20; color: white;
  padding: 9px 5px; font-size: .82rem; font-weight: 800;
  text-align: center; border: 2px solid #145214;
}
.ptable td {
  border: 2px solid #C8E6C9; padding: 10px 5px;
  text-align: center; font-size: 1.35rem;
  font-weight: 900; color: #1A237E;
}
.ptable tr:nth-child(odd) td { background: #F1F8E9; }
.ptable tr:nth-child(even) td { background: #FAFFF5; }
.hl { background: #FFF176 !important; color: #E65100 !important; font-size: 1.5rem; }

/* ABACUS */
.abacus-wrap {
  display: flex; gap: 6px; justify-content: center;
  align-items: flex-end; margin: 16px 0;
  direction: ltr;
  overflow-x: auto;
}
.abacus-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.abacus-col-label {
  font-size: .7rem; font-weight: 800; color: #1B5E20;
  text-align: center; margin-bottom: 4px; max-width: 44px;
}
.abacus-rod {
  width: 6px; background: linear-gradient(#8D6E63, #5D4037);
  border-radius: 3px; position: relative;
}
.abacus-bead {
  width: 28px; height: 14px; border-radius: 7px;
  background: linear-gradient(135deg, #42A5F5, #1565C0);
  border: 2px solid #0D47A1;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 2px 4px rgba(0,0,0,.25);
}
.abacus-bead:hover { transform: scale(1.15); }
.abacus-bead.active {
  background: linear-gradient(135deg, #EF5350, #B71C1C);
  border-color: #880000;
}
.abacus-base {
  width: 100%; height: 12px;
  background: linear-gradient(#26A69A, #00796B);
  border-radius: 4px; margin-top: 4px;
}
.abacus-counter {
  font-size: 1.2rem; font-weight: 900; color: #1B5E20;
  margin-top: 4px;
}

/* BUTTONS */
.btn {
  border: none; border-radius: 13px;
  font-family: inherit; font-weight: 800; font-size: .95rem;
  cursor: pointer; padding: 10px 20px;
  transition: all .2s;
  display: inline-flex; align-items: center; gap: 7px;
}
.btn:active { transform: scale(.95); }
.btn-primary { background: linear-gradient(135deg,#1B5E20,#2E7D32); color:white; box-shadow:0 4px 12px rgba(27,94,32,.3); }
.btn-primary:hover { transform: translateY(-2px); }
.btn-green { background: linear-gradient(135deg,#2E7D32,#1B5E20); color:white; }
.btn-orange { background: linear-gradient(135deg,#F57F17,#E65100); color:white; }
.btn-sky { background: linear-gradient(135deg,#0277BD,#01579B); color:white; }
.btn-choice {
  display: block; width: 100%;
  background: #F1F8E9; color: #1B5E20;
  border: 2.5px solid #A5D6A7;
  border-radius: 13px; padding: 11px 15px;
  font-size: .93rem; font-weight: 700;
  cursor: pointer; text-align: right;
  margin-bottom: 9px; transition: all .2s;
}
.btn-choice:hover { background: #C8E6C9; }
.btn-choice.correct { background: #E8F5E9; border-color: #388E3C; color: #1B5E20; }
.btn-choice.wrong { background: #FFEBEE; border-color: #C62828; color: #C62828; }

/* FEEDBACK */
.fb {
  border-radius: 15px; padding: 13px 17px;
  font-size: .95rem; font-weight: 700;
  text-align: center; margin-top: 13px;
  display: none;
  animation: pop .4s ease;
}
@keyframes pop {
  0%{transform:scale(.7);opacity:0;}
  60%{transform:scale(1.1);}
  100%{transform:scale(1);opacity:1;}
}
.fb.ok { background: #E8F5E9; border: 2px solid #388E3C; color: #1B5E20; display: block; }
.fb.err { background: #FFEBEE; border: 2px solid #C62828; color: #C62828; display: block; }

/* STEPS */
.steps-box {
  background: var(--purple-light); border-radius: 15px;
  padding: 13px; margin: 11px 0;
  border-right: 5px solid var(--purple);
}
.step-row { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 9px; }
.step-n {
  background: var(--purple); color: white;
  border-radius: 50%; width: 27px; height: 27px;
  display: flex; align-items: center; justify-content: center;
  font-size: .82rem; font-weight: 800; flex-shrink: 0;
}
.step-t { font-size: .9rem; font-weight: 600; line-height: 1.65; }

/* NUMBER CARDS */
.num-card {
  background: linear-gradient(135deg,#E8F5E9,#C8E6C9);
  border: 2.5px solid #388E3C;
  border-radius: 16px; padding: 14px 20px;
  font-size: 1.7rem; font-weight: 900;
  color: #1B5E20; text-align: center;
  letter-spacing: 3px; direction: ltr;
  margin: 10px 0;
}

/* GROUP SPLIT */
.group-split {
  display: flex; align-items: center;
  justify-content: center; gap: 12px;
  flex-wrap: wrap; margin: 14px 0;
}
.group-box {
  border-radius: 14px; padding: 12px 18px;
  text-align: center; font-weight: 900;
}
.group-thousands {
  background: linear-gradient(135deg,#E3F2FD,#BBDEFB);
  border: 2.5px solid #1565C0; color: #0D47A1;
}
.group-units {
  background: linear-gradient(135deg,#E8F5E9,#C8E6C9);
  border: 2.5px solid #2E7D32; color: #1B5E20;
}
.group-label { font-size: .75rem; margin-bottom: 4px; opacity: .8; }
.group-num { font-size: 1.6rem; direction: ltr; letter-spacing: 2px; }
.group-arrow {
  font-size: 1.5rem; color: #555; font-weight: 900;
}

/* INPUT */
.txt-input {
  border: 3px solid #388E3C; border-radius: 11px;
  padding: 9px 14px; font-size: 1rem;
  font-family: inherit; font-weight: 700;
  color: #1B5E20; width: 100%;
  outline: none; transition: border-color .2s;
  direction: rtl;
}
.txt-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(245,127,23,.2); }

/* CELEBRATION */
.celeb {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: none; align-items: center; justify-content: center; z-index: 999;
}
.celeb.show { display: flex; }
.celeb-box {
  background: white; border-radius: 26px; padding: 30px;
  text-align: center; max-width: 360px; width: 90%;
  animation: zoomIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes zoomIn { from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;} }
.celeb-stars { font-size: 2.4rem; margin: 8px 0; }
.celeb-title { font-size: 1.5rem; font-weight: 900; color: #1B5E20; margin-bottom: 7px; }
.celeb-msg { font-size: .95rem; color: #555; margin-bottom: 18px; line-height: 1.6; }

/* CONFETTI */
.cf { position:fixed;width:12px;height:12px;opacity:0;animation:fall 3s ease-in forwards;border-radius:2px;z-index:1000; }
@keyframes fall { 0%{opacity:1;transform:translateY(-80px)rotateZ(0);}100%{opacity:0;transform:translateY(100vh)rotateZ(720deg);} }

/* INTRO */
.intro { text-align: center; padding: 18px 10px; }
.intro-title { font-size: 1.9rem; font-weight: 900; color: #1B5E20; margin-bottom: 8px; }
.intro-sub { font-size: .97rem; color: #555; margin-bottom: 18px; line-height: 1.8; }
.intro-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(130px,1fr)); gap: 9px; margin-bottom: 18px; }
.intro-item {
  background: linear-gradient(135deg,#E8F5E9,#C8E6C9);
  border: 2px solid #388E3C; border-radius: 13px;
  padding: 11px 7px; font-size: .82rem; font-weight: 700;
  color: #1B5E20; text-align: center;
}
.intro-icon { font-size: 1.5rem; margin-bottom: 4px; }

/* MATCH GAME */
.match-area { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
.match-col { display: flex; flex-direction: column; gap: 8px; }
.match-card {
  border-radius: 13px; padding: 11px 14px;
  font-weight: 800; font-size: .9rem;
  cursor: pointer; border: 2.5px solid;
  transition: all .2s; text-align: center;
}
.match-num { background: #E3F2FD; border-color: #1565C0; color: #0D47A1; direction: ltr; font-size: 1.05rem; }
.match-word { background: #F1F8E9; border-color: #388E3C; color: #1B5E20; line-height: 1.5; font-size: .82rem; }
.match-card.selected { transform: scale(1.05); box-shadow: 0 4px 12px rgba(0,0,0,.2); }
.match-card.matched { opacity: .55; pointer-events: none; }
.match-card.match-correct { border-color: #388E3C !important; background: #E8F5E9 !important; }
.match-card.match-wrong { border-color: #C62828 !important; background: #FFEBEE !important; }

/* ABACUS INTERACTIVE */
.abacus-interactive {
  display: flex; gap: 5px; justify-content: center;
  align-items: flex-end; margin: 16px auto;
  direction: ltr; overflow-x: auto; padding: 8px;
}
.ab-col { display: flex; flex-direction: column; align-items: center; }
.ab-lbl { font-size: .68rem; font-weight: 800; color: #1B5E20; margin-bottom: 6px; text-align: center; max-width: 42px; }
.ab-beads { display: flex; flex-direction: column; gap: 3px; align-items: center; min-height: 140px; justify-content: flex-end; }
.ab-bead {
  width: 30px; height: 15px; border-radius: 7px;
  background: linear-gradient(135deg, #42A5F5, #1565C0);
  border: 2px solid #0D47A1;
  cursor: pointer; transition: all .18s;
  box-shadow: 0 2px 4px rgba(0,0,0,.2);
}
.ab-bead.lit {
  background: linear-gradient(135deg, #EF5350, #B71C1C);
  border-color: #7F0000;
}
.ab-rod {
  width: 5px; height: 20px;
  background: linear-gradient(#8D6E63,#5D4037);
  border-radius: 3px;
}
.ab-base { width: 38px; height: 11px; background: linear-gradient(#26A69A,#00796B); border-radius: 4px; margin-top: 5px; }
.ab-val { font-size: 1rem; font-weight: 900; color: #1B5E20; margin-top: 5px; }

@media(max-width:480px){
  .match-area{grid-template-columns:1fr;}
  .group-split{flex-direction:column;}
  .ab-bead{width:24px;height:12px;}
  .ctitle{font-size:1.05rem;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🔢 الأعداد ضمن مئات الألوف</div>
  <div class="score-box" id="scoreBox">⭐ <span id="scoreDisp">٠</span></div>
</div>
<div class="prog-wrap">
  <div class="prog-label">التقدم: <span id="progLbl">لم تبدأ بعد</span></div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="gmain" id="gmain"></div>

<div class="celeb" id="celebWrap">
  <div class="celeb-box">
    <div class="celeb-stars" id="cStars">⭐⭐⭐</div>
    <div class="celeb-title" id="cTitle">رائع!</div>
    <div class="celeb-msg" id="cMsg"></div>
    <button class="btn btn-green" onclick="nextStage()">التالي ←</button>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────
var stage = -1;
var score = 0;
var TOTAL = 9;

function ar(n) {
  return String(n).replace(/[0-9]/g, function(d){ return '٠١٢٣٤٥٦٧٨٩'[d]; });
}

function updProg() {
  var pct = stage < 0 ? 0 : Math.round(stage / TOTAL * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLbl').textContent =
    stage < 0 ? 'لم تبدأ بعد' : 'المرحلة ' + ar(stage) + ' من ' + ar(TOTAL);
  document.getElementById('scoreDisp').textContent = ar(score);
}

function addScore(n) {
  score += n;
  document.getElementById('scoreDisp').textContent = ar(score);
  var b = document.getElementById('scoreBox');
  b.style.transform = 'scale(1.25)';
  setTimeout(function(){ b.style.transform = 'scale(1)'; }, 280);
}

function snd(type) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if (type === 'ok') {
      o.frequency.setValueAtTime(523, ctx.currentTime);
      o.frequency.setValueAtTime(659, ctx.currentTime + .12);
      o.frequency.setValueAtTime(784, ctx.currentTime + .24);
      g.gain.setValueAtTime(.28, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .55);
      o.start(); o.stop(ctx.currentTime + .55);
    } else {
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(180, ctx.currentTime);
      g.gain.setValueAtTime(.18, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .28);
      o.start(); o.stop(ctx.currentTime + .28);
    }
  } catch(e) {}
}

function cfetti() {
  var cols = ['#F57F17','#388E3C','#1565C0','#C62828','#6A1B9A','#F9A825'];
  for (var i = 0; i < 52; i++) {
    var el = document.createElement('div');
    el.className = 'cf';
    el.style.cssText = 'left:' + (Math.random()*100) + 'vw;top:0;background:' + cols[Math.floor(Math.random()*cols.length)] + ';animation-delay:' + (Math.random()*.8) + 's;animation-duration:' + (2+Math.random()*2) + 's;';
    document.body.appendChild(el);
    setTimeout(function(){ el.remove(); }, 4500);
  }
}

function celeb(title, msg) {
  document.getElementById('cTitle').textContent = title;
  document.getElementById('cMsg').textContent = msg;
  document.getElementById('celebWrap').classList.add('show');
  cfetti(); snd('ok');
}

function nextStage() {
  document.getElementById('celebWrap').classList.remove('show');
  stage++;
  updProg();
  render();
}

function render() {
  document.getElementById('gmain').innerHTML = '';
  var fns = [s0, s1, s2, s3, s4, s5, s6, s7, s8, sFinal];
  if (stage < 0) { renderIntro(); return; }
  if (stage < fns.length) fns[stage]();
  else sFinal();
}

function html(h) {
  document.getElementById('gmain').innerHTML = '<div class="card">' + h + '</div>';
}

// ── MASCOT ─────────────────────────────────────
function ms() {
  return '<svg class="mascot-svg" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="22" r="18" fill="#F9A825"/><circle cx="22" cy="18" r="3" fill="#1A237E"/><circle cx="38" cy="18" r="3" fill="#1A237E"/><circle cx="23" cy="17" r="1.2" fill="white"/><circle cx="39" cy="17" r="1.2" fill="white"/><path d="M22 28 Q30 35 38 28" stroke="#1A237E" stroke-width="2.5" fill="none" stroke-linecap="round"/><ellipse cx="18" cy="22" rx="4" ry="3" fill="#F57F17" opacity=".7"/><ellipse cx="42" cy="22" rx="4" ry="3" fill="#F57F17" opacity=".7"/><path d="M20 40 Q30 44 40 40 L38 55 Q30 58 22 55 Z" fill="#1B5E20"/><circle cx="30" cy="6" r="4" fill="#66BB6A"/></svg>';
}

// ── PLACE TABLE helper (RTL: آحاد أقصى اليمين) ──
function placeTable(headers, rows) {
  var h = '<table class="ptable"><tr>';
  // headers already in RTL order from caller
  headers.forEach(function(hh){ h += '<th>' + hh + '</th>'; });
  h += '</tr>';
  rows.forEach(function(row){
    h += '<tr>';
    row.forEach(function(cell){
      if (cell && cell.toString().indexOf('hl:') === 0) {
        h += '<td class="hl">' + cell.toString().replace('hl:','') + '</td>';
      } else {
        h += '<td>' + (cell === '' ? '' : cell) + '</td>';
      }
    });
    h += '</tr>';
  });
  h += '</table>';
  return h;
}

// Place table headers RTL (آحاد → مئات الألوف from right to left display)
var HDR6 = ['الآحاد','العشرات','المئات','الألوف','عشرات الألوف','مئات الألوف'];
var HDR5 = ['الآحاد','العشرات','المئات','الألوف','عشرات الألوف'];

// ── ABACUS DISPLAY (static beads) ─────────────
// cols: array of bead counts from RIGHT (آحاد) to LEFT (مئات الألوف)
// labels array also RTL
function abacusStatic(cols, labels) {
  var html = '<div class="abacus-wrap">';
  // show left-to-right in DOM (highest place first) but cols[0]=آحاد
  // we reverse for display so highest place is leftmost
  var revCols = cols.slice().reverse();
  var revLbls = labels.slice().reverse();
  revCols.forEach(function(count, ci) {
    html += '<div class="abacus-col">';
    html += '<div class="abacus-col-label">' + revLbls[ci] + '</div>';
    // max 9 beads shown
    var maxB = 9;
    for (var b = maxB; b >= 1; b--) {
      html += '<div class="abacus-bead' + (b <= count ? ' active' : '') + '"></div>';
    }
    html += '<div class="abacus-base"></div>';
    html += '<div class="abacus-counter">' + ar(count) + '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// ══════════════════════════════════════════════
// INTRO
// ══════════════════════════════════════════════
function renderIntro() {
  stage = -1;
  html(
    '<div class="intro">' +
    '<div style="font-size:2.8rem;margin-bottom:10px;">🔢</div>' +
    '<div class="intro-title">الأعداد ضمن مئات الألوف</div>' +
    '<div class="intro-sub">مرحباً! في هذا الدرس ستتعلم كيف تقرأ الأعداد الكبيرة حتى مئات الألوف! 🎉</div>' +
    '<div class="intro-grid">' +
    '<div class="intro-item"><div class="intro-icon">🔍</div>اكتشاف مئة ألف</div>' +
    '<div class="intro-item"><div class="intro-icon">📊</div>جدول المنازل</div>' +
    '<div class="intro-item"><div class="intro-icon">🧮</div>العداد التفاعلي</div>' +
    '<div class="intro-item"><div class="intro-icon">🎯</div>مثال ١: قراءة ٢٥٢٣٢</div>' +

// S2 — العداد التفاعلي (مثال من الكتاب)
// ══════════════════════════════════════════════
// Abacus for 25232: آحاد=2, عشرات=3, مئات=2, ألوف=5, عشرات الألوف=2
var abState = [2, 3, 2, 5, 2, 0]; // index 0=آحاد ... 5=مئات الألوف
var abLbls = ['الآحاد','العشرات','المئات','الألوف','عشرات الألوف','مئات الألوف'];

function s2() {
  abState = [0, 0, 0, 0, 0, 0];
  renderAbacus();
}

function renderAbacus() {
  // compute the number
  var places = [1, 10, 100, 1000, 10000, 100000];
  var total = 0;
  abState.forEach(function(v, i){ total += v * places[i]; });

  var colsHTML = '';
  // display right-to-left (RTL: آحاد on right, but in DOM we build left-to-right for flex)
  // We'll show highest (مئات الألوف) first (leftmost)
  for (var ci = 5; ci >= 0; ci--) {
    colsHTML += '<div class="ab-col">';
    colsHTML += '<div class="ab-lbl">' + abLbls[ci] + '</div>';
    colsHTML += '<div class="ab-beads">';
    for (var b = 9; b >= 1; b--) {
      colsHTML += '<div class="ab-bead' + (b <= abState[ci] ? ' lit' : '') + '" onclick="toggleBead(' + ci + ',' + b + ')"></div>';
    }
    colsHTML += '</div>';
    colsHTML += '<div class="ab-rod"></div>';
    colsHTML += '<div class="ab-base"></div>';
    colsHTML += '<div class="ab-val">' + ar(abState[ci]) + '</div>';
    colsHTML += '</div>';
  }

  var numStr = total > 0 ? ar(total) : '٠';

  document.getElementById('gmain').innerHTML =
    '<div class="card">' +
    '<div class="badge">🧮 العداد التفاعلي</div>' +
    '<div class="ctitle">ضع الخرزات لتكوين العدد ٢٥٢٣٢</div>' +
    '<div class="mascot-row">' + ms() + '<div class="mascot-txt">انقر على الخرزات لتضيئها! ضع الخرزات الصحيحة في كل عمود لتكوين العدد <strong>٢٥٢٣٢</strong><br>آحاد=٢، عشرات=٣، مئات=٢، ألوف=٥، عشرات الألوف=٢</div></div>' +

    '<div class="abacus-interactive" id="abWrap">' + colsHTML + '</div>' +

    '<div style="text-align:center;margin-top:10px;">' +
    '<div style="font-size:1rem;font-weight:700;color:#555;margin-bottom:6px;">العدد المُكوَّن:</div>' +
    '<div class="num-card" style="font-size:1.8rem;display:inline-block;min-width:200px;">' + numStr + '</div>' +
    '</div>' +

    '<div style="text-align:center;margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">' +
    '<button class="btn btn-orange" onclick="resetAbacus()">🔄 إعادة</button>' +
    '<button class="btn btn-green" onclick="checkAbacus()">✅ تحقق</button>' +
    '</div>' +
    '<div class="fb" id="fbAb"></div>' +
    '</div>';
}

function toggleBead(col, bead) {
  abState[col] = (abState[col] === bead) ? bead - 1 : bead;
  renderAbacus();
}

function resetAbacus() {
  abState = [0, 0, 0, 0, 0, 0];
  renderAbacus();
}

function checkAbacus() {
  var fb = document.getElementById('fbAb');
  // 25232: آحاد=2,عشرات=3,مئات=2,ألوف=5,عشرات الألوف=2,مئات الألوف=0
  var expected = [2, 3, 2, 5, 2, 0];
  var ok = expected.every(function(v, i){ return abState[i] === v; });
  if (ok) {
    fb.className = 'fb ok';
    fb.innerHTML = '✅ ممتاز! كوّنت العدد ٢٥٢٣٢ بشكل صحيح! يُقرأ: خمسة وعشرون ألفاً ومئتان واثنان وثلاثون.';
    addScore(15); snd('ok');
    setTimeout(function(){ celeb('🧮 أتقنت العداد!', 'رائع! الآن ننتقل لقراءة الأعداد!'); }, 1100);
  } else {
    fb.className = 'fb err';
    var hints = '';
    var names = ['الآحاد','العشرات','المئات','الألوف','عشرات الألوف','مئات الألوف'];
    expected.forEach(function(v, i){
      if (abState[i] !== v) hints += ' ' + names[i] + '=' + ar(v) + '،';
    });
    fb.innerHTML = '❌ ليس بعد! المطلوب:' + hints.slice(0,-1);
    snd('err');
  }
}

var matchData = [
  { num: '٣٣٩٨٧٠', word: 'ثلاثمئة وتسعة وثلاثون ألفاً وثمانمئة وسبعون' },
  { num: '٧١٢٣٤٥', word: 'سبعمئة واثنا عشر ألفاً وثلاثمئة وخمسة وأربعون' }
];
var matchSel = { num: null, word: null };
var matchDone = [];

function s6() {
  matchSel = { num: null, word: null };
  matchDone = [];
  renderMatch();
}

function renderMatch() {
  var numsHTML = '';
  var wordsHTML = '';
  matchData.forEach(function(item, i) {
    var isDone = matchDone.indexOf(i) !== -1;
    numsHTML += '<div class="match-card match-num' + (isDone ? ' matched match-correct' : '') + '" id="mn' + i + '" onclick="selectMatch(\'num\',' + i + ')">' + item.num + '</div>';
    wordsHTML += '<div class="match-card match-word' + (isDone ? ' matched match-correct' : '') + '" id="mw' + i + '" onclick="selectMatch(\'word\',' + i + ')">' + item.word + '</div>';
  });

  // shuffle words display (swap order)
  var words = [matchData[1].word, matchData[0].word];
  var wordIds = [1, 0]; // word at position 0 is matchData[1], at position 1 is matchData[0]
  wordsHTML = '';
  words.forEach(function(w, pos) {
    var origIdx = wordIds[pos];
    var isDone = matchDone.indexOf(origIdx) !== -1;
    wordsHTML += '<div class="match-card match-word' + (isDone ? ' matched match-correct' : '') + '" id="mw' + origIdx + '" onclick="selectMatch(\'word\',' + origIdx + ')">' + w + '</div>';
  });

  document.getElementById('gmain').innerHTML =
    '<div class="card">' +
    '<div class="badge">🎮 تمرين /١ — أ وب</div>' +
    '<div class="ctitle">وصّل العدد بقراءته</div>' +
    '<div class="mascot-row">' + ms() + '<div class="mascot-txt">انقر على عدد ثم انقر على قراءته الصحيحة لتوصيلهما! 🔗</div></div>' +
    '<div class="match-area">' +
    '<div class="match-col">' + numsHTML + '</div>' +
    '<div class="match-col">' + wordsHTML + '</div>' +
    '</div>' +
    '<div class="fb" id="fbMatch"></div>' +
    '</div>';
}

function selectMatch(type, idx) {
  if (matchDone.indexOf(idx) !== -1) return;

  // deselect same type
  if (matchSel[type] !== null) {
    var old = matchSel[type];
    var oldEl = document.getElementById((type === 'num' ? 'mn' : 'mw') + old);
    if (oldEl) oldEl.classList.remove('selected');
  }

  matchSel[type] = idx;
  var el = document.getElementById((type === 'num' ? 'mn' : 'mw') + idx);
  if (el) el.classList.add('selected');

  // Check if both selected
  if (matchSel.num !== null && matchSel.word !== null) {
    var fb = document.getElementById('fbMatch');
    if (matchSel.num === matchSel.word) {
      // Correct
      ['mn','mw'].forEach(function(prefix) {
        var e = document.getElementById(prefix + matchSel.num);
        if (e) { e.classList.remove('selected'); e.classList.add('matched','match-correct'); }
      });
      matchDone.push(matchSel.num);
      fb.className = 'fb ok';
      fb.innerHTML = '✅ صحيح! ' + matchData[matchSel.num].num + ' = ' + matchData[matchSel.num].word;
      addScore(10); snd('ok');
      matchSel = { num: null, word: null };
      if (matchDone.length === matchData.length) {
        setTimeout(function(){ celeb('🎮 ممتاز!', 'وصّلت جميع الأعداد بقراءتها الصحيحة!'); }, 900);
      }
    } else {
      // Wrong
      fb.className = 'fb err';
      fb.innerHTML = '❌ ليس مطابقاً! راجع قراءة كل عدد وحاول مرة أخرى.';
      snd('err');
      ['mn' + matchSel.num, 'mw' + matchSel.word].forEach(function(id) {
        var e = document.getElementById(id);
        if (e) { e.classList.remove('selected'); }
      });
      matchSel = { num: null, word: null };
    }
  }
}

    q.opts.forEach(function(opt, oi) {
      qHTML += '<label style="display:flex;align-items:center;gap:9px;cursor:pointer;background:white;border-radius:10px;padding:9px 12px;border:2px solid #E8F5E9;margin-bottom:6px;">';
      qHTML += '<input type="radio" name="fq' + i + '" value="' + oi + '" style="width:17px;height:17px;accent-color:#1B5E20;" onchange="finalA[' + i + ']=parseInt(this.value)">';
      qHTML += '<span style="font-size:.9rem;">' + opt + '</span></label>';
    });
    qHTML += '</div>';
  });

  document.getElementById('gmain').innerHTML =
    '<div class="card">' +
    '<div class="badge">🏆 التحدي النهائي</div>' +
    '<div class="ctitle">مراجعة شاملة — ' + ar(Qs.length) + ' سؤالاً</div>' +
    '<div class="mascot-row">' + ms() + '<div class="mascot-txt">أثبت أنك أتقنت الأعداد ضمن مئات الألوف! 🏆<br>أجب على جميع الأسئلة ثم اضغط "إنهاء"!</div></div>' +
    qHTML +
    '<div style="text-align:center;margin-top:18px;">' +
    '<button class="btn btn-orange" onclick="submitFinal()" style="font-size:1rem;padding:13px 26px;">🏁 إنهاء التحدي</button>' +
    '</div>' +
    '<div class="fb" id="fbFinal" style="margin-top:14px;"></div>' +
    '</div>';

  window._finalQs2 = Qs;
  finalA = {};
}

function submitFinal() {
  var fb = document.getElementById('fbFinal');
  var Qs = window._finalQs2;
  var correct = 0, details = '';
  Qs.forEach(function(q, i) {
    var ok = finalA[i] === q.ans;
    if (ok) {
      correct++;
      details += '<div style="color:#1B5E20;font-size:.83rem;margin-bottom:3px;">✅ سؤال ' + ar(i+1) + ': صحيح</div>';
    } else {
      details += '<div style="color:#C62828;font-size:.83rem;margin-bottom:3px;">❌ سؤال ' + ar(i+1) + ': الإجابة الصحيحة: ' + q.opts[q.ans] + '</div>';
    }
  });
  var pct = Math.round(correct / Qs.length * 100);
  var stars = pct >= 90 ? '⭐⭐⭐' : pct >= 70 ? '⭐⭐' : '⭐';
  addScore(correct * 5); snd('ok');
  if (pct >= 70) cfetti();
  fb.className = 'fb ok';
  fb.style.display = 'block';
  fb.innerHTML =
    '<div style="font-size:1.5rem;text-align:center;margin-bottom:7px;">' + stars + '</div>' +
    '<div style="font-size:1.15rem;font-weight:900;text-align:center;margin-bottom:11px;">أجبت بشكل صحيح على ' + ar(correct) + ' من ' + ar(Qs.length) + ' (' + ar(pct) + '%)</div>' +
    '<div style="max-height:200px;overflow-y:auto;border-top:1px solid #ccc;padding-top:9px;">' + details + '</div>' +
    '<div style="text-align:center;margin-top:14px;">' +
    '<button class="btn btn-primary" onclick="stage=-1;score=0;updProg();renderIntro();">🔄 العب مجدداً</button>' +
    '</div>';
  setTimeout(function(){ fb.scrollIntoView({behavior:'smooth'}); }, 300);
}

// ── INIT ───────────────────────────────────────
renderIntro();
</script>
</body>
</html>
